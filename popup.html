<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shelly Installer Helper</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">Shelly helper</p>
        <h1 data-i18n="popupTitle">Installer helper</h1>
      </header>
      <section class="card">
        <div class="row">
          <span data-i18n="status">Status</span>
          <strong id="status" data-i18n="loading">Loading...</strong>
        </div>
        <div class="row">
          <span data-i18n="host">Host</span>
          <strong id="host">-</strong>
        </div>
        <div class="row">
          <span data-i18n="device">Device</span>
          <strong id="device">-</strong>
        </div>
      </section>
      <section class="actions">
        <button id="open-helper" type="button" data-i18n="openUrlHelper">Open URL helper</button>
        <button id="enable-host" type="button" data-i18n="alwaysShowHere">Always show here</button>
        <button id="disable-host" type="button" data-i18n="doNotShowHere">Do not show here</button>
        <button id="open-options" type="button" data-i18n="settings">Settings</button>
      </section>
      <p id="message" class="message" aria-live="polite"></p>
    </main>
    <script src="locales.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
