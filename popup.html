<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shelly Installer Helper</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">Shelly helper</p>
        <h1>Installer helper</h1>
      </header>
      <section class="card">
        <div class="row">
          <span>Status</span>
          <strong id="status">Loading...</strong>
        </div>
        <div class="row">
          <span>Host</span>
          <strong id="host">-</strong>
        </div>
        <div class="row">
          <span>Device</span>
          <strong id="device">-</strong>
        </div>
      </section>
      <section class="actions">
        <button id="open-helper" type="button">Open URL helper</button>
        <button id="enable-host" type="button">Always show here</button>
        <button id="disable-host" type="button">Do not show here</button>
        <button id="open-options" type="button">Settings</button>
      </section>
      <p id="message" class="message" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
